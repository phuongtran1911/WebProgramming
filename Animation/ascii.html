<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ASCII Animation Viewer</title>
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.0/jquery.min.js"></script>
  <link href="ascii.css" type="text/css" rel="stylesheet" />
  <script src="animations.js" type="text/javascript"></script>
  <script src="ascii.js" type="text/javascript"></script>
</head>
<body onload="idle()">
  <h1>ASCII Animation Viewer</h1>
  <textarea id="text" cols="80" rows="20"></textarea>
  <div id="controls">
    <fieldset>
      <legend>Play Controls:</legend>
      <button id="start" onclick="start();">Start</button>
      <button id="stop" onclick="stop();" disabled>Stop</button>
    </fieldset>
    <fieldset>
      <legend>Animation:</legend>
      <select id="animation">
        <option>Blank</option>
        <option>Exercise</option>
        <option>Juggler</option>
        <option>Bike</option>
        <option>Dive</option>
        <option>Custom</option>
      </select>
    </fieldset>
    <fieldset>
      <legend>Size:</legend>
      <select id="size">
        <option>Tiny</option>
        <option>Small</option>
        <option>Medium</option>
        <option>Large</option>
        <option>Extra Large</option>
        <option>XXL</option>
      </select>
    </fieldset>
    <fieldset>
      <legend>Speed:</legend>
      <input type="checkbox" id="turbo">Turbo
    </fieldset>
  </div>
</body>
</html>
